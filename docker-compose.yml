services:
  backend:
    build: ./threadscope-backend
    container_name: threadscope-backend
    restart: unless-stopped
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build: ./threadscope-frontend
    container_name: threadscope-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
